<!DOCTYPE html>
<html>
<head>
    <title>Test de botón</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px;">
    <h1>Prueba de botón</h1>
    <p>Si el botón funciona, debe aparecer un mensaje</p>
    
    <button onclick="mostrarMensaje()" style="padding: 15px 40px; background: blue; color: white; border: none; border-radius: 10px; font-size: 18px;">
        HAZ CLIC AQUÍ
    </button>
    
    <p id="resultado" style="margin-top: 30px; font-size: 18px;"></p>

    <script>
        function mostrarMensaje() {
            document.getElementById('resultado').innerHTML = '✅ ¡EL BOTÓN FUNCIONA CORRECTAMENTE!';
            alert('El botón funciona');
        }
        
        console.log('Página cargada correctamente');
    </script>
</body>
</html>
