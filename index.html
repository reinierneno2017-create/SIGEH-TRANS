<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEST - SIGEH-TRANS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h1>🔧 TEST DE CONEXIÓN SUPABASE</h1>
    <p>Este archivo prueba si la conexión a Supabase funciona correctamente.</p>
    
    <hr>
    
    <label><strong>Email:</strong></label><br>
    <input type="email" id="email" style="width: 100%; padding: 10px; margin: 10px 0;" placeholder="ejemplo@correo.com">
    
    <label><strong>Contraseña:</strong></label><br>
    <input type="password" id="password" style="width: 100%; padding: 10px; margin: 10px 0;">
    
    <button onclick="hacerLogin()" style="background: #667eea; color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer;">🔐 PROBAR LOGIN</button>
    
    <h3>📋 Resultado:</h3>
    <div id="resultado" style="background: #f0f0f0; padding: 15px; border-radius: 10px; font-family: monospace; white-space: pre-wrap;"></div>
    
    <hr>
    <p><strong>Credenciales para probar:</strong></p>
    <ul>
        <li><strong>Email:</strong> <code>sigehtrans.holguin@gmail.com</code></li>
        <li><strong>Contraseña:</strong> La que configuraste en Supabase</li>
    </ul>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = "https://jnmhbsvjnsvagcdfujok.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpubWhic3ZqbnN2YWdjZGZ1am9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ5NjUsImV4cCI6MjA5MTE1MDk2NX0.n6cSbVkX0u23zshq49O0FPCwLKS3MP-o8J8EyroI75E";
        
        // Crear cliente de Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Función de login
        async function hacerLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const resultadoDiv = document.getElementById('resultado');
            
            // Limpiar resultado anterior
            resultadoDiv.innerHTML = '';
            resultadoDiv.style.color = 'black';
            
            // Validar campos
            if (!email) {
                resultadoDiv.innerHTML = '❌ ERROR: Debes escribir un correo electrónico';
                resultadoDiv.style.color = 'red';
                return;
            }
            
            if (!password) {
                resultadoDiv.innerHTML = '❌ ERROR: Debes escribir una contraseña';
                resultadoDiv.style.color = 'red';
                return;
            }
            
            // Mostrar que está procesando
            resultadoDiv.innerHTML = '⏳ Conectando a Supabase...\n';
            resultadoDiv.innerHTML += `📧 Email: ${email}\n`;
            resultadoDiv.innerHTML += `🔗 URL: ${SUPABASE_URL}\n\n`;
            
            try {
                const inicio = Date.now();
                
                // Intentar login
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                const fin = Date.now();
                resultadoDiv.innerHTML += `⏱️ Tiempo de respuesta: ${fin - inicio} ms\n\n`;
                
                if (error) {
                    // Mostrar error
                    resultadoDiv.innerHTML += `❌ ERROR DE AUTENTICACIÓN:\n`;
                    resultadoDiv.innerHTML += `Mensaje: ${error.message}\n`;
                    resultadoDiv.innerHTML += `Código: ${error.status || 'sin código'}\n`;
                    resultadoDiv.style.color = 'red';
                } else {
                    // Mostrar éxito
                    resultadoDiv.innerHTML += `✅ ¡LOGIN EXITOSO!\n`;
                    resultadoDiv.innerHTML += `👤 Usuario: ${data.user.email}\n`;
                    resultadoDiv.innerHTML += `🆔 ID: ${data.user.id}\n`;
                    resultadoDiv.innerHTML += `📅 Creado: ${data.user.created_at || 'N/A'}\n`;
                    resultadoDiv.style.color = 'green';
                }
                
            } catch (error) {
                resultadoDiv.innerHTML += `❌ ERROR INESPERADO:\n`;
                resultadoDiv.innerHTML += `Mensaje: ${error.message}\n`;
                resultadoDiv.style.color = 'red';
            }
        }
        
        // Mensaje de inicio
        console.log('✅ Archivo de prueba cargado correctamente');
        document.getElementById('resultado').innerHTML = '✅ Archivo cargado. Escribe tus credenciales y haz clic en "PROBAR LOGIN"';
    </script>
</body>
</html>
