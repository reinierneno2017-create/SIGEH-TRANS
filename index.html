<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEH-TRANS - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 12px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .error-msg {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
            background: #fdecea;
            padding: 10px;
            border-radius: 8px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🚛 SIGEH-TRANS</h1>
        <div class="subtitle">SISTEMA DE GESTIÓN HUMANA DEL TRANSPORTE</div>
        
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="iniciarSesion()">Iniciar Sesión</button>
        
        <div id="mensaje" class="error-msg"></div>
        <div class="footer">Desarrollado por Reynier Velázquez Morales - 2026</div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = "https://jnmhbsvjnsvagcdfujok.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpubWhic3ZqbnN2YWdjZGZ1am9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ5NjUsImV4cCI6MjA5MTE1MDk2NX0.n6cSbVkX0u23zshq49O0FPCwLKS3MP-o8J8EyroI75E";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function iniciarSesion() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const mensajeDiv = document.getElementById('mensaje');
            
            mensajeDiv.innerHTML = '⏳ Conectando...';
            
            if (!email || !password) {
                mensajeDiv.innerHTML = '❌ Ingrese correo y contraseña';
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    mensajeDiv.innerHTML = '❌ ' + error.message;
                } else {
                    mensajeDiv.innerHTML = '✅ ¡Bienvenido ' + data.user.email + '!';
                    alert('Login exitoso: ' + data.user.email);
                }
            } catch (e) {
                mensajeDiv.innerHTML = '❌ Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
