<!DOCTYPE html>
<html>
<head>
    <title>Test Ultra Simple</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px;">
    <h1>🚛 SIGEH-TRANS</h1>
    <p>Test más simple posible</p>
    
    <input type="text" id="email" placeholder="Email" style="padding: 10px; width: 250px;"><br><br>
    <input type="password" id="pass" placeholder="Contraseña" style="padding: 10px; width: 250px;"><br><br>
    
    <button id="miBoton" style="padding: 12px 30px; background: blue; color: white; border: none; border-radius: 5px;">CLIC AQUÍ</button>
    
    <p id="resultado" style="margin-top: 30px; font-size: 18px;"></p>

    <script>
        // Buscar el botón por ID
        const boton = document.getElementById('miBoton');
        const resultado = document.getElementById('resultado');
        
        // Agregar evento al botón
        boton.addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            
            resultado.innerHTML = '✅ Botón funcionó. Email: ' + email + ' - Pass: ' + (pass ? '****' : 'vacía');
            resultado.style.color = 'green';
        });
        
        // Mensaje de carga
        resultado.innerHTML = '✅ Página cargada. Haz clic en el botón.';
        resultado.style.color = 'blue';
    </script>
</body>
</html>
